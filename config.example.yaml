bot:
  name: PhantomClaw
  mode: OBSERVE
  timezone: Asia/Kuala_Lumpur
  log_level: info

telegram:
  token: "" # use PHANTOM_TELEGRAM_TOKEN or .secrets
  chat_id: 0 # use PHANTOM_TELEGRAM_CHAT_ID or .secrets

llm:
  primary: claude
  sticky_primary: true
  aliases:
    smart: claude
    fast: groq
    cheap: deepseek
    local: ollama

  providers:
    - name: claude
      type: claude
      api_key: "" # PHANTOM_LLM_PROVIDERS_0_API_KEY
      model: claude-sonnet-4-20250514

    - name: openai
      type: openai
      api_key: "" # PHANTOM_LLM_PROVIDERS_1_API_KEY
      model: gpt-4o

    - name: openrouter
      type: openai_compat
      base_url: "https://openrouter.ai/api/v1"
      api_key: "" # PHANTOM_LLM_PROVIDERS_2_API_KEY
      model: anthropic/claude-sonnet-4

    - name: groq
      type: openai_compat
      base_url: "https://api.groq.com/openai/v1"
      api_key: "" # PHANTOM_LLM_PROVIDERS_3_API_KEY
      model: llama-3.3-70b-versatile
      allowed_tools:
        - confidence_score
        - spread_filter
        - correlation_guard

    - name: mistral
      type: openai_compat
      base_url: "https://api.mistral.ai/v1"
      api_key: "" # PHANTOM_LLM_PROVIDERS_4_API_KEY
      model: mistral-large-latest

    - name: deepseek
      type: openai_compat
      base_url: "https://api.deepseek.com/v1"
      api_key: "" # PHANTOM_LLM_PROVIDERS_5_API_KEY
      model: deepseek-chat
      allowed_tools:
        - confidence_score
        - spread_filter

    - name: ollama
      type: openai_compat
      base_url: "http://localhost:11434/v1"
      api_key: "ollama"
      model: qwen3
      allowed_tools:
        - confidence_score
        - spread_filter
        - correlation_guard

bridge:
  host: "127.0.0.1"
  port: 8765
  auth_token: "" # use PHANTOM_BRIDGE_AUTH_TOKEN or .secrets
  signal_timeout_ms: 30000

market:
  fail_policy: "fail_open" # fail_open | fail_closed

risk:
  max_lot_size: 0.10
  max_daily_loss_usd: 100.0
  max_open_positions: 3
  max_drawdown_pct: 10.0
  suggest_timeout_sec: 180
  min_trade_interval: "15m"
  ramp_up_trades: 10
  ramp_up_lot_pct: 0.50

sessions:
  tokyo_open: "08:00"
  pre_london: "14:45"
  london_open: "15:00"
  ny_overlap_end: "00:00"
  learning_start: "00:00"
  learning_end: "08:00"

memory:
  db_path: "data/phantom.db"
  log_dir: "data/logs"
  sessions_dir: "data/sessions"

heartbeat:
  enabled: true
  interval_min: 5

ops_alerts:
  enabled: true
  poll_interval_sec: 10
  probe_timeout_ms: 1500
  degrade_for_sec: 20
  repeat_every_sec: 900
  update_cooldown_sec: 120

pairs:
  - XAUUSD
  - EURUSD
  - USDJPY
  - GBPUSD
