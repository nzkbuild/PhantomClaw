# PhantomClaw Configuration
# --------------------------
# All values can be overridden via environment variables with PHANTOM_ prefix.
# Example: PHANTOM_TELEGRAM_TOKEN=your_token_here

bot:
  name: PhantomClaw
  mode: AUTO                    # OBSERVE | SUGGEST | AUTO | HALT
  timezone: Asia/Kuala_Lumpur   # MYT = UTC+8
  log_level: info               # debug | info | warn | error

telegram:
  token: ""                     # Set via PHANTOM_TELEGRAM_TOKEN env var
  chat_id: 0                    # Your Telegram user/chat ID

llm:
  primary: claude               # Provider name or alias (e.g. "claude", "fast", "cheap")

  # Model aliases — shortcuts for quick switching via Telegram
  aliases:
    fast: groq                  # /mode fast → uses Groq (500+ tok/sec)
    cheap: deepseek             # /mode cheap → uses DeepSeek
    smart: claude               # /mode smart → uses Claude
    local: ollama               # /mode local → uses local Ollama

  # Providers — ordered list. Add any OpenAI-compatible provider here.
  # Types: "claude" (Anthropic API), "openai" (OpenAI SDK), "openai_compat" (any /v1/chat/completions)
  providers:
    - name: claude
      type: claude
      api_key: ""               # Set via PHANTOM_LLM_PROVIDERS_0_API_KEY
      model: claude-sonnet-4-20250514

    - name: openai
      type: openai
      api_key: ""               # Set via PHANTOM_LLM_PROVIDERS_1_API_KEY
      model: gpt-4o

    - name: deepseek
      type: openai_compat
      base_url: "https://api.deepseek.com/v1"
      api_key: ""               # Set via PHANTOM_LLM_PROVIDERS_2_API_KEY
      model: deepseek-chat

    # --- Add new providers below (uncomment to activate) ---

    # - name: groq
    #   type: openai_compat
    #   base_url: "https://api.groq.com/openai/v1"
    #   api_key: ""
    #   model: llama-3.3-70b-versatile

    # - name: openrouter
    #   type: openai_compat
    #   base_url: "https://openrouter.ai/api/v1"
    #   api_key: ""
    #   model: anthropic/claude-sonnet-4

    # - name: ollama
    #   type: openai_compat
    #   base_url: "http://localhost:11434/v1"
    #   api_key: "ollama"
    #   model: qwen3

bridge:
  host: "127.0.0.1"
  port: 8765

risk:
  max_lot_size: 0.10            # Maximum lot size per trade
  max_daily_loss_usd: 100.0     # Hard daily loss limit (USD)
  max_open_positions: 3         # Maximum concurrent open positions
  max_drawdown_pct: 10.0        # Max drawdown % before auto-HALT
  suggest_timeout_sec: 180      # SUGGEST mode approval timeout (seconds)
  min_trade_interval: "15m"     # Minimum time between trades
  ramp_up_trades: 10            # Number of profitable trades before full lot
  ramp_up_lot_pct: 0.50         # Lot percentage during ramp-up (50%)

sessions:
  tokyo_open: "08:00"           # MYT — RESEARCH mode starts
  pre_london: "14:45"           # MYT — Pre-session Telegram alert
  london_open: "15:00"          # MYT — TRADING mode starts
  ny_overlap_end: "00:00"       # MYT — Hard stop, no new trades
  learning_start: "00:00"       # MYT — LEARNING mode starts
  learning_end: "08:00"         # MYT — LEARNING mode ends

memory:
  db_path: "data/phantom.db"
  log_dir: "data/logs"

pairs:
  - XAUUSD
  - EURUSD
  - USDJPY
  - GBPUSD
